apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crawler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ysheep0906/facticle-gitops.git
    targetRevision: main
    path: helm/facticle-crawler
  destination:
    server: https://kubernetes.default.svc
    namespace: crawler
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
